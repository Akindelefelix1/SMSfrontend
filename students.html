<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SMS - Students</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body class="page">
  <header class="topbar">
    <div class="container">
      <a class="brand" href="index.html">SMS</a>
      <nav class="nav">
        <a href="login.html">Login</a>
        <a href="dashboard.html" class="active">Dashboard</a>
        <a href="registration.html">Registration</a>
        <a href="results.html">Results</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="hero">
      <div>
        <h1>Students</h1>
        <p>Add students and keep records locally until backend integration is ready.</p>
      </div>
      <a class="btn btn-outline" href="dashboard.html">Back to Dashboard</a>
    </section>

    <section class="card">
      <h2>Add Student</h2>
      <form id="studentForm">
        <div class="form-grid">
          <label>
            <span>Student No</span>
            <input type="text" name="studentNo" placeholder="20/1234" required />
          </label>
          <label>
            <span>Full Name</span>
            <input type="text" name="name" placeholder="e.g. Mary Okon" required />
          </label>
          <label>
            <span>Department</span>
            <select name="department" class="department-select" required>
              <option value="">Select department</option>
            </select>
          </label>
          <label>
            <span>Level</span>
            <select name="level" required>
              <option>100</option>
              <option>200</option>
              <option>300</option>
              <option>400</option>
              <option>500</option>
            </select>
          </label>
          <label>
            <span>Status</span>
            <select name="status" required>
              <option>Active</option>
              <option>Pending</option>
              <option>On Hold</option>
            </select>
          </label>
        </div>
        <div class="actions" style="margin-top: 16px;">
          <button class="btn" type="submit">Add Student</button>
        </div>
      </form>
    </section>

    <section class="card">
      <h2>Students List</h2>
      <table class="table">
        <thead>
          <tr>
            <th>Student No</th>
            <th>Name</th>
            <th>Department</th>
            <th>Level</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="studentsBody"></tbody>
      </table>
    </section>

    <section class="card">
      <h2>Departments</h2>
      <form id="departmentForm">
        <div class="form-grid">
          <label>
            <span>Department Name</span>
            <input type="text" name="name" placeholder="e.g. Physics" required />
          </label>
        </div>
        <div class="actions" style="margin-top: 16px;">
          <button class="btn" type="submit">Add Department</button>
        </div>
      </form>

      <table class="table" style="margin-top: 16px;">
        <thead>
          <tr>
            <th>Department</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="departmentsBody"></tbody>
      </table>
    </section>

    <section class="card">
      <h2>Data Tools</h2>
      <div class="actions">
        <button class="btn" id="exportDataBtn" type="button">Export JSON</button>
        <label class="btn btn-outline" for="importDataFile">Import JSON</label>
        <input id="importDataFile" type="file" accept="application/json" style="display: none;" />
        <button class="btn btn-outline" id="resetDataBtn" type="button">Reset Local Data</button>
      </div>
    </section>
  </main>

  <script src="assets/js/local-store.js"></script>
  <script src="assets/js/manage-data.js"></script>
</body>
</html>
