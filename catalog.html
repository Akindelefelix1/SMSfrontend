<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SMS - Course Catalog</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body class="page">
  <header class="topbar">
    <div class="container">
      <a class="brand" href="index.html">SMS</a>
      <nav class="nav">
        <a href="login.html">Login</a>
        <a href="dashboard.html" class="active">Dashboard</a>
        <a href="registration.html">Registration</a>
        <a href="results.html">Results</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="hero">
      <div>
        <h1>Course Catalog</h1>
        <p>Add and review courses stored locally in tester browser storage.</p>
      </div>
      <a class="btn btn-outline" href="dashboard.html">Back to Dashboard</a>
    </section>

    <section class="card">
      <h2>Add Course</h2>
      <form id="courseForm">
        <div class="form-grid">
          <label>
            <span>Course Code</span>
            <input type="text" name="code" placeholder="CSC 205" required />
          </label>
          <label>
            <span>Course Title</span>
            <input type="text" name="title" placeholder="Database Systems" required />
          </label>
          <label>
            <span>Units</span>
            <input type="number" name="units" min="1" max="6" required />
          </label>
          <label>
            <span>Semester</span>
            <select name="semester" required>
              <option>First Semester</option>
              <option>Second Semester</option>
            </select>
          </label>
        </div>
        <div class="actions" style="margin-top: 16px;">
          <button class="btn" type="submit">Add Course</button>
        </div>
      </form>
    </section>

    <section class="card">
      <h2>Current Courses</h2>
      <table class="table">
        <thead>
          <tr>
            <th>Code</th>
            <th>Title</th>
            <th>Units</th>
            <th>Semester</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="coursesBody"></tbody>
      </table>
    </section>

    <section class="card">
      <h2>Data Tools</h2>
      <div class="actions">
        <button class="btn" id="exportDataBtn" type="button">Export JSON</button>
        <label class="btn btn-outline" for="importDataFile">Import JSON</label>
        <input id="importDataFile" type="file" accept="application/json" style="display: none;" />
        <button class="btn btn-outline" id="resetDataBtn" type="button">Reset Local Data</button>
      </div>
    </section>
  </main>

  <script src="assets/js/local-store.js"></script>
  <script src="assets/js/manage-data.js"></script>
</body>
</html>
